<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Slurm 集群监控系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Fira+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --bg-primary: #F8FAFC;
            --bg-secondary: #F1F5F9;
            --bg-card: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #64748B;
            --accent: #22C55E;
            --accent-hover: #16A34A;
            --border-color: #E2E8F0;
        }
        
        body {
            font-family: 'Fira Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #F0FDF4 0%, #F8FAFC 50%, #EFF6FF 100%);
            min-height: 100vh;
        }
        
        /* 动态背景网格 */
        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: 
                linear-gradient(rgba(34, 197, 94, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(34, 197, 94, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
        }
        
        /* 发光球体装饰 */
        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.2;
            pointer-events: none;
        }
        
        .glow-orb-1 {
            width: 400px;
            height: 400px;
            background: var(--accent);
            top: -100px;
            right: -100px;
            animation: float 20s ease-in-out infinite;
        }
        
        .glow-orb-2 {
            width: 300px;
            height: 300px;
            background: #3B82F6;
            bottom: -50px;
            left: -50px;
            animation: float 25s ease-in-out infinite reverse;
        }
        
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }
        
        /* 玻璃卡片效果 */
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 
                0 25px 50px -12px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.5) inset;
        }
        
        /* 输入框样式 */
        .input-field {
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }
        
        .input-field:hover {
            border-color: #CBD5E1;
            background: #FFFFFF;
        }
        
        .input-field:focus {
            background: #FFFFFF;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(34, 197, 94, 0.15);
            outline: none;
        }
        
        .input-field::placeholder {
            color: #94A3B8;
        }
        
        /* Tab 样式 */
        .tab-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-secondary);
            transition: all 0.2s ease;
        }
        
        .tab-btn:hover {
            background: rgba(0, 0, 0, 0.03);
            color: var(--text-primary);
        }
        
        .tab-active {
            background: rgba(34, 197, 94, 0.1);
            border-color: rgba(34, 197, 94, 0.3);
            color: var(--accent);
        }
        
        /* 登录按钮 */
        .btn-login {
            background: var(--accent);
            color: #000;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-login::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-login:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 10px 40px -10px rgba(34, 197, 94, 0.4);
        }
        
        .btn-login:hover::before {
            left: 100%;
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        /* 错误提示动画 */
        .error-shake {
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        
        /* Logo 发光效果 */
        .logo-glow {
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.2);
        }
        
        /* 代码字体 */
        .font-mono {
            font-family: 'Fira Code', monospace;
        }
        
        /* 密码强度条 */
        .password-strength {
            height: 3px;
            border-radius: 2px;
            transition: all 0.3s ease;
        }
        
        /* 响应式优化 */
        @media (max-width: 640px) {
            .glass-card {
                margin: 1rem;
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <!-- 背景装饰 -->
    <div class="bg-grid"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    
    <div class="relative z-10 w-full max-w-md">
        <!-- Logo 和标题 -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl mb-4 logo-glow border border-white/10">
                <i class="fas fa-server text-2xl text-green-500"></i>
            </div>
            <h1 class="text-2xl font-bold text-slate-800 mb-1 tracking-tight">Slurm Cluster Monitor</h1>
            <p class="text-slate-500 text-sm font-mono">集群资源监控与管理系统</p>
        </div>

        <!-- 登录卡片 -->
        <div class="glass-card rounded-2xl p-8">
            <!-- Tab 切换 -->
            <div class="flex gap-2 mb-6 p-1 bg-slate-100 rounded-lg border border-slate-200">
                <button type="button" onclick="switchTab('admin')" id="tab-admin" class="tab-btn flex-1 py-2.5 px-4 rounded-md text-sm font-medium tab-active">
                    <i class="fas fa-shield-alt mr-2"></i>管理员
                </button>
                <button type="button" onclick="switchTab('user')" id="tab-user" class="tab-btn flex-1 py-2.5 px-4 rounded-md text-sm font-medium">
                    <i class="fas fa-user mr-2"></i>普通用户
                </button>
            </div>

            <!-- 错误提示 -->
            <div id="error-message" class="hidden mb-4 p-3 bg-red-500/10 border border-red-500/20 rounded-lg">
                <p class="text-red-400 text-sm flex items-center">
                    <i class="fas fa-exclamation-circle mr-2"></i>
                    <span id="error-text"></span>
                </p>
            </div>

            <!-- 管理员登录表单 -->
            <form id="admin-form" onsubmit="return handleAdminLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">管理员密码</label>
                        <div class="relative">
                            <input type="password" id="admin-password" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="请输入管理员密码" required>
                            <button type="button" onclick="togglePassword('admin-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors cursor-pointer">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button type="submit" class="btn-login w-full py-3 rounded-lg text-sm">
                        <i class="fas fa-sign-in-alt mr-2"></i>登录系统
                    </button>
                </div>
            </form>

            <!-- 普通用户登录表单 -->
            <form id="user-form" class="hidden" onsubmit="return handleUserLogin(event)">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">用户名</label>
                        <input type="text" id="username" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="请输入系统用户名" required>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">密码</label>
                        <div class="relative">
                            <input type="password" id="user-password" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="请输入密码" required>
                            <button type="button" onclick="togglePassword('user-password')" class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 transition-colors cursor-pointer">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 首次登录修改密码 -->
                    <div id="change-password-section" class="hidden space-y-4 pt-4 border-t border-slate-200">
                        <div class="flex items-center gap-2 text-amber-600 text-sm mb-2">
                            <i class="fas fa-info-circle"></i>
                            <span>首次登录，请设置新密码</span>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">新密码</label>
                            <input type="password" id="new-password" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="请输入新密码">
                            <div class="mt-2 bg-slate-200 rounded-full h-1 overflow-hidden">
                                <div id="strength-bar" class="password-strength h-full" style="width: 0%"></div>
                            </div>
                            <p class="text-xs text-slate-500 mt-1">密码长度至少6位</p>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-2">确认新密码</label>
                            <input type="password" id="confirm-password" class="input-field w-full px-4 py-3 rounded-lg text-sm" placeholder="请再次输入新密码">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn-login w-full py-3 rounded-lg text-sm">
                        <i class="fas fa-sign-in-alt mr-2"></i>登录系统
                    </button>
                </div>
            </form>
        </div>

        <!-- 底部信息 -->
        <div class="text-center mt-6 text-slate-500 text-xs font-mono">
            <p>© 2026 Slurm Cluster Monitoring System</p>
            <p class="mt-1 text-slate-600">v2.0.0</p>
        </div>
    </div>

    <script>
        let currentTab = 'admin';
        
        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('tab-admin').classList.toggle('tab-active', tab === 'admin');
            document.getElementById('tab-user').classList.toggle('tab-active', tab === 'user');
            document.getElementById('admin-form').classList.toggle('hidden', tab !== 'admin');
            document.getElementById('user-form').classList.toggle('hidden', tab !== 'user');
            hideError();
        }
        
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            const icon = input.nextElementSibling.querySelector('i');
            input.type = input.type === 'password' ? 'text' : 'password';
            icon.className = input.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        }
        
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            document.getElementById('error-text').textContent = message;
            errorDiv.classList.remove('hidden');
            errorDiv.classList.add('error-shake');
            setTimeout(() => errorDiv.classList.remove('error-shake'), 500);
        }
        
        function hideError() {
            document.getElementById('error-message').classList.add('hidden');
        }
        
        async function handleAdminLogin(event) {
            event.preventDefault();
            hideError();
            
            const password = document.getElementById('admin-password').value;
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({type: 'admin', password}),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/';
                } else {
                    showError(data.message || '密码错误');
                }
            } catch (e) {
                showError('登录失败，请稍后重试');
            }
            
            return false;
        }
        
        async function handleUserLogin(event) {
            event.preventDefault();
            hideError();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('user-password').value;
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            
            const isChangePassword = !document.getElementById('change-password-section').classList.contains('hidden');
            
            if (isChangePassword) {
                if (!newPassword || !confirmPassword) {
                    showError('请填写新密码');
                    return false;
                }
                if (newPassword !== confirmPassword) {
                    showError('两次输入的密码不一致');
                    return false;
                }
                if (newPassword.length < 6) {
                    showError('密码长度至少6位');
                    return false;
                }
            }
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        type: 'user',
                        username,
                        password,
                        newPassword: isChangePassword ? newPassword : null
                    }),
                    credentials: 'include'
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/';
                } else if (data.message === 'first_login') {
                    document.getElementById('change-password-section').classList.remove('hidden');
                    showError('首次登录，请修改密码');
                } else {
                    showError(data.message || '用户名或密码错误');
                }
            } catch (e) {
                showError('登录失败，请稍后重试');
            }
            
            return false;
        }
        
        // 监听新密码输入，检测是否需要显示修改密码 section
        document.getElementById('user-password').addEventListener('change', async function() {
            const username = document.getElementById('username').value;
            const password = this.value;
            
            if (username && password) {
                try {
                    const response = await fetch('/api/check-first-login', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({username, password})
                    });
                    
                    const data = await response.json();
                    
                    if (data.firstLogin) {
                        document.getElementById('change-password-section').classList.remove('hidden');
                    }
                } catch (e) {}
            }
        });
        
        // 密码强度检测
        document.getElementById('new-password').addEventListener('input', function() {
            const strength = document.getElementById('strength-bar');
            const len = this.value.length;
            
            if (len === 0) {
                strength.style.width = '0%';
                strength.style.backgroundColor = 'transparent';
            } else if (len < 6) {
                strength.style.width = '30%';
                strength.style.backgroundColor = '#ef4444';
            } else if (len < 10) {
                strength.style.width = '60%';
                strength.style.backgroundColor = '#f59e0b';
            } else {
                strength.style.width = '100%';
                strength.style.backgroundColor = '#22c55e';
            }
        });
    </script>
</body>
</html>
