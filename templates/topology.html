{% extends "base.html" %}

{% block title %}组织拓扑 - Slurm 集群监控系统{% endblock %}
{% block page_title %}组织拓扑{% endblock %}
{% block page_subtitle %}QOS、账户、用户层级关系可视化{% endblock %}

{% block content %}
<!-- 组织拓扑页面 -->
<div id="page-topology" class="page-section">
    <div class="bg-white rounded-xl shadow-sm border border-slate-200">
        <div class="p-6 border-b border-slate-200 flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-800">
                <i class="fas fa-project-diagram text-primary-500 mr-2"></i>组织拓扑图
            </h3>
            <button onclick="loadTopologyData()" class="px-4 py-2 bg-primary-500 hover:bg-primary-600 text-white rounded-lg transition-colors">
                <i class="fas fa-sync-alt mr-2"></i>刷新
            </button>
        </div>
        <div class="p-6">
            <div id="topology-loading" class="flex items-center justify-center py-12 text-slate-500">
                <div class="spinner mr-3"></div>加载中...
            </div>
            <div id="topology-content" class="hidden">
                <div id="topology-legend" class="flex items-center gap-6 mb-4 text-sm">
                    <div class="flex items-center">
                        <div class="w-4 h-4 rounded-full bg-emerald-500 mr-2"></div>
                        <span>QOS</span>
                    </div>
                    <div class="flex items-center">
                        <div class="w-4 h-4 rounded-full bg-blue-500 mr-2"></div>
                        <span>账户</span>
                    </div>
                    <div class="flex items-center">
                        <div class="w-4 h-4 rounded-full bg-purple-500 mr-2"></div>
                        <span>用户</span>
                    </div>
                </div>
                <div id="topology-container" class="overflow-auto" style="min-height: 500px; position: relative;"></div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// 检查用户登录状态
async function checkUserStatus() {
    try {
        const response = await fetch('/api/current-user');
        const data = await response.json();
        
        if (!data.logged_in) {
            window.location.href = '/login';
            return;
        }
        
        window.currentUserType = data.user_type;
        window.currentUsername = data.username;
    } catch (e) {
        console.error('检查用户状态失败:', e);
    }
}

// 加载组织拓扑数据
async function loadTopologyData() {
    try {
        document.getElementById('topology-loading').classList.remove('hidden');
        document.getElementById('topology-content').classList.add('hidden');
        
        const response = await fetch('/api/organization-topology');
        const data = await response.json();
        
        renderTopology(data);
        
        document.getElementById('topology-loading').classList.add('hidden');
        document.getElementById('topology-content').classList.remove('hidden');
    } catch (error) {
        console.error('Error loading topology:', error);
        document.getElementById('topology-loading').textContent = '加载失败: ' + error.message;
    }
}

// 渲染组织拓扑图 - 使用 SVG 曲线连接
function renderTopology(data) {
    const container = document.getElementById('topology-container');
    container.innerHTML = '';
    
    if ((!data.qos || data.qos.length === 0) && 
        (!data.accounts || data.accounts.length === 0) && 
        (!data.users || data.users.length === 0)) {
        container.innerHTML = '<div class="text-center py-12 text-slate-500"><i class="fas fa-project-diagram text-4xl mb-3"></i><p>暂无拓扑数据</p></div>';
        return;
    }
    
    const nodeWidth = 220;
    const nodeHeight = 120;
    const gapX = 40;
    const gapY = 80;
    const qosY = 60;
    const accountY = 280;
    const userY = 480;
    
    // 计算布局
    const totalWidth = Math.max(
        (data.qos?.length || 0) * (nodeWidth + gapX),
        (data.accounts?.length || 0) * (nodeWidth + gapX),
        (data.users?.length || 0) * (nodeWidth + gapX)
    ) + 100;
    
    const svgHeight = 600;
    
    // 生成节点位置映射
    const positions = {};
    
    // QOS 节点位置
    const qosStartX = (totalWidth - ((data.qos?.length || 0) * (nodeWidth + gapX))) / 2 + 50;
    (data.qos || []).forEach((q, i) => {
        positions['qos:' + q.name] = {
            x: qosStartX + i * (nodeWidth + gapX),
            y: qosY,
            type: 'qos',
            data: q
        };
    });
    
    // 账户节点位置
    const accountStartX = (totalWidth - ((data.accounts?.length || 0) * (nodeWidth + gapX))) / 2 + 50;
    (data.accounts || []).forEach((a, i) => {
        positions['account:' + a.name] = {
            x: accountStartX + i * (nodeWidth + gapX),
            y: accountY,
            type: 'account',
            data: a
        };
    });
    
    // 用户节点位置
    const userStartX = (totalWidth - ((data.users?.length || 0) * (nodeWidth + gapX))) / 2 + 50;
    (data.users || []).forEach((u, i) => {
        positions['user:' + u.name] = {
            x: userStartX + i * (nodeWidth + gapX),
            y: userY,
            type: 'user',
            data: u
        };
    });
    
    // 生成 SVG 连接线
    let svgHtml = `<svg width="${totalWidth}" height="${svgHeight}" style="position: absolute; top: 0; left: 0; pointer-events: none; z-index: 1;">`;
    
    // QOS -> Account 连接线
    data.links.filter(l => l.from === 'qos').forEach(link => {
        const fromPos = positions['qos:' + link.from_name];
        const toPos = positions['account:' + link.to_name];
        if (fromPos && toPos) {
            svgHtml += createCurve(fromPos.x + nodeWidth/2, fromPos.y + nodeHeight, toPos.x + nodeWidth/2, toPos.y, '#10b981');
        }
    });
    
    // Account -> User 连接线
    data.links.filter(l => l.from === 'account').forEach(link => {
        const fromPos = positions['account:' + link.from_name];
        const toPos = positions['user:' + link.to_name];
        if (fromPos && toPos) {
            svgHtml += createCurve(fromPos.x + nodeWidth/2, fromPos.y + nodeHeight, toPos.x + nodeWidth/2, toPos.y, '#3b82f6');
        }
    });
    
    svgHtml += '</svg>';
    
    // 生成节点 HTML
    let nodesHtml = '<div style="position: relative; width: ' + totalWidth + 'px; height: ' + svgHeight + 'px; z-index: 2;">';
    
    // QOS 节点
    (data.qos || []).forEach(q => {
        const pos = positions['qos:' + q.name];
        nodesHtml += renderNodeHTML(pos.x, pos.y, 'qos', q, data.accounts || [], data, positions);
    });
    
    // 账户节点
    (data.accounts || []).forEach(a => {
        const pos = positions['account:' + a.name];
        const linkedUsers = (data.users || []).filter(u => u.account === a.name);
        nodesHtml += renderAccountNodeHTML(pos.x, pos.y, a, linkedUsers, data, positions);
    });
    
    // 用户节点
    (data.users || []).forEach(u => {
        const pos = positions['user:' + u.name];
        nodesHtml += renderUserNodeHTML(pos.x, pos.y, u);
    });
    
    nodesHtml += '</div>';
    
    container.innerHTML = svgHtml + nodesHtml;
}

// 创建贝塞尔曲线
function createCurve(x1, y1, x2, y2, color) {
    const midY = (y1 + y2) / 2;
    const ctrlOffset = Math.min(80, Math.abs(y2 - y1) * 0.3);
    return `<path d="M ${x1} ${y1} C ${x1} ${y1 + ctrlOffset}, ${x2} ${y2 - ctrlOffset}, ${x2} ${y2}" 
            stroke="${color}" stroke-width="2" fill="none" stroke-dasharray="5,5" opacity="0.6"/>`;
}

// 渲染 QOS 节点 HTML
function renderNodeHTML(x, y, type, data, linkedAccounts, allData, positions) {
    const quotaHtml = formatQuotaInfo(data);
    
    let linkedHtml = '';
    if (linkedAccounts.length > 0) {
        linkedHtml = `<div class="mt-3 pt-2 border-t border-emerald-200">
            <div class="text-xs text-emerald-600 mb-1">→ 关联账户:</div>
            <div class="flex flex-wrap gap-1">`;
        linkedAccounts.forEach(a => {
            linkedHtml += `<span class="px-2 py-0.5 bg-blue-100 text-blue-700 rounded text-xs">${escapeHtml(a.name)}</span>`;
        });
        linkedHtml += '</div></div>';
    }
    
    return `
        <div style="position: absolute; left: ${x}px; top: ${y}px; width: 220px;" class="bg-white rounded-xl shadow-lg border-2 border-emerald-500 p-4 cursor-pointer hover:shadow-xl transition-shadow">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-8 h-8 rounded-full bg-emerald-500 flex items-center justify-center text-white">
                    <i class="fas fa-cog"></i>
                </div>
                <div>
                    <div class="text-xs text-emerald-600 font-medium">QOS</div>
                    <div class="font-bold text-slate-800">${escapeHtml(data.name)}</div>
                </div>
            </div>
            ${quotaHtml}
            ${linkedHtml}
        </div>
    `;
}

// 渲染账户节点 HTML
function renderAccountNodeHTML(x, y, data, linkedUsers, allData, positions) {
    const quotaHtml = formatQuotaInfo(data.quota);
    
    let linkedHtml = '';
    if (linkedUsers.length > 0) {
        linkedHtml = `<div class="mt-3 pt-2 border-t border-blue-200">
            <div class="text-xs text-blue-600 mb-1">→ 用户:</div>
            <div class="flex flex-wrap gap-1">`;
        linkedUsers.forEach(u => {
            linkedHtml += `<span class="px-2 py-0.5 bg-purple-100 text-purple-700 rounded text-xs">${escapeHtml(u.name)}</span>`;
        });
        linkedHtml += '</div></div>';
    }
    
    return `
        <div style="position: absolute; left: ${x}px; top: ${y}px; width: 220px;" class="bg-white rounded-xl shadow-lg border-2 border-blue-500 p-4 cursor-pointer hover:shadow-xl transition-shadow">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-8 h-8 rounded-full bg-blue-500 flex items-center justify-center text-white">
                    <i class="fas fa-folder"></i>
                </div>
                <div>
                    <div class="text-xs text-blue-600 font-medium">账户</div>
                    <div class="font-bold text-slate-800">${escapeHtml(data.name)}</div>
                </div>
            </div>
            ${quotaHtml}
            ${linkedHtml}
        </div>
    `;
}

// 渲染用户节点 HTML
function renderUserNodeHTML(x, y, data) {
    const quotaHtml = formatQuotaInfo(data.quota);
    
    return `
        <div style="position: absolute; left: ${x}px; top: ${y}px; width: 220px;" class="bg-white rounded-xl shadow-lg border-2 border-purple-500 p-4 cursor-pointer hover:shadow-xl transition-shadow">
            <div class="flex items-center gap-2 mb-2">
                <div class="w-8 h-8 rounded-full bg-purple-500 flex items-center justify-center text-white">
                    <i class="fas fa-user"></i>
                </div>
                <div>
                    <div class="text-xs text-purple-600 font-medium">用户</div>
                    <div class="font-bold text-slate-800">${escapeHtml(data.name)}</div>
                </div>
            </div>
            ${quotaHtml}
        </div>
    `;
}

// 格式化配额信息
function formatQuotaInfo(quota) {
    if (!quota) return '';
    
    let html = '<div class="text-xs space-y-1">';
    
    if (quota.grp_tres && quota.grp_tres !== 'N/A') {
        html += `<div class="flex justify-between"><span class="text-slate-500">组资源:</span><span>${escapeHtml(quota.grp_tres)}</span></div>`;
    }
    if (quota.max_tres && quota.max_tres !== 'N/A') {
        html += `<div class="flex justify-between"><span class="text-slate-500">最大:</span><span>${escapeHtml(quota.max_tres)}</span></div>`;
    }
    if (quota.max_wall && quota.max_wall !== 'N/A') {
        html += `<div class="flex justify-between"><span class="text-slate-500">时长:</span><span>${escapeHtml(quota.max_wall)}</span></div>`;
    }
    if (quota.max_jobs && quota.max_jobs !== 'N/A') {
        html += `<div class="flex justify-between"><span class="text-slate-500">作业数:</span><span>${escapeHtml(quota.max_jobs)}</span></div>`;
    }
    if (quota.priority) {
        html += `<div class="flex justify-between"><span class="text-slate-500">优先级:</span><span>${escapeHtml(quota.priority)}</span></div>`;
    }
    
    html += '</div>';
    return html;
}

function escapeHtml(text) {
    if (!text) return '';
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 页面加载完成后初始化
document.addEventListener('DOMContentLoaded', function() {
    checkUserStatus();
    loadTopologyData();
});
</script>
{% endblock %}
