<!DOCTYPE html>
<html>
<head>
    <title>Chart Test</title>
    <style>
        body { background: #1a1a2e; color: #fff; font-family: Arial; padding: 20px; }
        .chart-container { height: 250px; width: 300px; background: #16213e; padding: 20px; border-radius: 10px; }
    </style>
</head>
<body>
    <h2>Chart.js Test</h2>
    <div class="chart-container">
        <canvas id="test-chart"></canvas>
    </div>
    <div id="status"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script>
        document.getElementById('status').innerHTML = '<p>Chart.js loaded: ' + (typeof Chart !== 'undefined') + '</p>';
        
        if (typeof Chart !== 'undefined') {
            const ctx = document.getElementById('test-chart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['空闲', '已分配', '混合'],
                    datasets: [{
                        data: [1, 1, 1],
                        backgroundColor: ['#2ecc71', '#f39c12', '#9b59b6']
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#fff' } }
                    }
                }
            });
            document.getElementById('status').innerHTML += '<p>Chart created successfully!</p>';
        }
    </script>
</body>
</html>
